server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: marketing-service
  
  # 可选的外部配置
  config:
    import: "optional:configserver:http://config-server:8888"
  
  # 数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/food_delivery_db
    username: dev
    password: dev123
    driver-class-name: org.postgresql.Driver
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 10
    show-sql: false
    
  # Flyway 数据库迁移配置
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    clean-disabled: true
  
  # 日志配置
  output:
    ansi:
      enabled: always

logging:
  level:
    root: INFO
    com.fooddelivery: DEBUG
    org.springframework.security: DEBUG

# 服务发现配置（可选）
eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://eureka-server:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    health-check-url-path: /actuator/health

# Swagger 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# JWT 配置
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000} # 1 day

# 增强监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true