services:
  # === 基础设施服务 ===
  # PostgreSQL 数据库
  postgres-db:
    image: postgres:15
    container_name: food-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123
      POSTGRES_DB: food_delivery_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - ./scripts:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dev -d food_delivery_db" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  # MongoDB 数据库
  mongo-db:
    image: mongo:6.0
    container_name: food-platform-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: dev
      MONGO_INITDB_ROOT_PASSWORD: dev123
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Mongo Express 管理界面
  mongo-express:
    image: mongo-express:latest
    container_name: food-platform-mongo-express
    restart: unless-stopped
    ports:
      - "8085:8081" # 访问 localhost:8085 查看MongoDB数据
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: dev
      ME_CONFIG_MONGODB_ADMINPASSWORD: dev123
      ME_CONFIG_MONGODB_URL: mongodb://dev:dev123@mongo-db:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo-db:
        condition: service_healthy

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: food-platform-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP 端口
      - "15672:15672" # 管理界面端口
    environment:
      RABBITMQ_DEFAULT_USER: dev
      RABBITMQ_DEFAULT_PASS: dev123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # === Java 微服务 ===
  # 商家服务
  merchant-service:
    build:
      context: .
      dockerfile: merchant-service/Dockerfile
    container_name: food-platform-merchant-service
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/food_delivery_db
      - SPRING_DATASOURCE_USERNAME=dev
      - SPRING_DATASOURCE_PASSWORD=dev123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=dev
      - SPRING_RABBITMQ_PASSWORD=dev123
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - EUREKA_CLIENT_ENABLED=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 营销服务（优惠券管理）
  marketing-service:
    build:
      context: .
      dockerfile: marketing-service/Dockerfile
    container_name: food-platform-marketing-service
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/food_delivery_db
      - SPRING_DATASOURCE_USERNAME=dev
      - SPRING_DATASOURCE_PASSWORD=dev123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - EUREKA_CLIENT_ENABLED=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 用户画像服务
  profile-service:
    build:
      context: .
      dockerfile: profile-service/Dockerfile
    container_name: food-platform-profile-service
    restart: unless-stopped
    ports:
      - "8086:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_MONGODB_URI=mongodb://dev:dev123@mongo-db:27017/food_delivery_profile?authSource=admin
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - EUREKA_CLIENT_ENABLED=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
    depends_on:
      mongo-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 用户服务
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: food-platform-user-service
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/food_delivery_db
      - SPRING_DATASOURCE_USERNAME=dev
      - SPRING_DATASOURCE_PASSWORD=dev123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - EUREKA_CLIENT_ENABLED=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 订单服务
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: food-platform-order-service
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/food_delivery_db
      - SPRING_DATASOURCE_USERNAME=dev
      - SPRING_DATASOURCE_PASSWORD=dev123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=dev
      - SPRING_RABBITMQ_PASSWORD=dev123
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - EUREKA_CLIENT_ENABLED=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # === Python 服务 ===
  # 推荐服务（智能推荐系统）
  recommendation-service:
    build:
      context: ./recommendation-service
      dockerfile: Dockerfile
    container_name: food-platform-recommendation-service
    restart: unless-stopped
    ports:
      - "8087:8082"
    volumes:
      - ./recommendation-service/.env:/app/.env:ro # 挂载环境变量文件
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app
      # 基础配置
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # AI配置
      - USE_AI_ORCHESTRATOR=${USE_AI_ORCHESTRATOR:-true}
      - USE_MCP_PROTOCOL=${USE_MCP_PROTOCOL:-true}
      # API密钥（从.env文件或环境变量读取）
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MAP_API_KEY=${MAP_API_KEY:-}
      - QWEATHER_API_KEY=${QWEATHER_API_KEY:-}
      # 默认位置
      - DEFAULT_CITY=${DEFAULT_CITY:-上海}
      - DEFAULT_LATITUDE=${DEFAULT_LATITUDE:-31.2891}
      - DEFAULT_LONGITUDE=${DEFAULT_LONGITUDE:-121.2180}
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # AI 定价服务
  ai-pricing-service:
    build:
      context: ./ai-pricing-service
      dockerfile: Dockerfile
    container_name: food-platform-ai-pricing-service
    restart: unless-stopped
    ports:
      - "8089:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://dev:dev123@postgres-db:5432/ai_pricing_db
      - RABBITMQ_URL=amqp://dev:dev123@rabbitmq:5672/
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # 平台管理服务
  platform-service:
    build:
      context: .
      dockerfile: platform-service/Dockerfile
    container_name: food-platform-platform-service
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/food_delivery_db
      - SPRING_DATASOURCE_USERNAME=dev
      - SPRING_DATASOURCE_PASSWORD=dev123
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - JWT_PUBLIC_KEY_PATH=/app/keys/ed25519-public.pem
      - EUREKA_CLIENT_ENABLED=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
    volumes:
      - ./ed25519-public.pem:/app/keys/ed25519-public.pem:ro
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8088/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# 营养视觉分析服务
  nutrivision-service:
    build:
      context: ./nutrivision-service
      dockerfile: Dockerfile
    container_name: food-platform-nutrivision-service
    restart: unless-stopped
    ports:
      - "8090:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-2.0-flash
      - GEMINI_BASE_URL=https://yinli.one/v1/chat/completions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # === 微服务基础设施（Profile: enhanced）===
  # 服务注册与发现中心
  eureka-server:
    image: ygqygq2/eureka-server:latest
    container_name: food-platform-eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      - EUREKA_INSTANCE_HOSTNAME=eureka-server
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE=http://eureka-server:8761/eureka/
      - EUREKA_SERVER_ENABLE_SELF_PRESERVATION=false
    # profiles: [ "enhanced" ]

  # Spring Cloud 配置中心
  config-server:
    image: hyness/spring-cloud-config-server:3.1.3
    container_name: food-platform-config-server
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS=file:/config
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
    volumes:
      - ./config-repo:/config:ro
    depends_on:
      - eureka-server
    profiles: [ "enhanced" ]

  # === 监控和可观测性（Profile: monitoring/enhanced）===
  # Prometheus 指标收集
  prometheus:
    image: prom/prometheus:latest
    container_name: food-platform-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.route-prefix=/'
    volumes:
      - prometheus_data:/prometheus
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    profiles: [ "monitoring", "enhanced" ]

  # Zipkin 分布式链路追踪
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: food-platform-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    environment:
      - STORAGE_TYPE=mem
    profiles: [ "monitoring", "enhanced" ]

  # Grafana 监控面板
  grafana:
    image: grafana/grafana:latest
    container_name: food-platform-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    profiles: [ "monitoring", "enhanced" ]

# === 数据卷配置 ===
volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  rabbitmq_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local

# === 配置文件 ===
configs:
  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

      scrape_configs:
        - job_name: 'spring-actuator'
          metrics_path: '/actuator/prometheus'
          static_configs:
            - targets: 
              - 'user-service:8080'
              - 'merchant-service:8080'
              - 'order-service:8080'
              - 'marketing-service:8080'
              - 'platform-service:8088'
              - 'profile-service:8080'

        - job_name: 'recommendation-service'
          static_configs:
            - targets: ['recommendation-service:8082']

        - job_name: 'eureka'
          static_configs:
            - targets: ['eureka-server:8761']

        - job_name: 'config-server'
          static_configs:
            - targets: ['config-server:8888']
