server:
  port: 8088

spring:
  application:
    name: platform-service
    
  # 可选的外部配置
  config:
    import: "optional:configserver:http://config-server:8888"
    
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:food_delivery}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# 服务发现配置（可选）
eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://eureka-server:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    health-check-url-path: /actuator/health

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}

# 分成计算定时任务配置
commission:
  scheduler:
    enabled: true
    cron: "0 */5 * * * *"  # 每5分钟执行一次

# 结算单配置
settlement:
  confirm-days: 3  # 确认期限（天）
  default-type: MONTHLY  # 默认结算类型：MONTHLY/WEEKLY
  scheduler:
    enabled: true
    monthly-cron: "0 0 2 1 * *"  # 每月1日凌晨2点
    weekly-cron: "0 0 2 * * MON"  # 每周一凌晨2点
    auto-confirm-cron: "0 0 8 * * *"  # 每天早上8点

# 增强监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.fooddelivery.platformservice: DEBUG
    org.springframework.security: DEBUG